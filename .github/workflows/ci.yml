name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Node einrichten
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Abhängigkeiten installieren (Server)
        run: npm ci

      - name: Typecheck (Server)
        run: npm run typecheck

      # Selftests laufen ohne Netz/ISR-Daten: die reinen Offline-Asserts greifen,
      # die Live-Smoke-Blöcke loggen/überspringen sich sauber (kein harter Assert).
      - name: Selftest – Geo-Helfer (Teilstueck-Verkettung)
        run: npx tsx src/core/geo.selftest.ts

      - name: Selftest – streckeninfo
        run: npx tsx src/data/streckeninfo.selftest.ts

      - name: Selftest – SSE-Hub
        run: npx tsx src/server/sse-hub.selftest.ts

      - name: Selftest – TUI
        run: npx tsx src/tui/tui.selftest.ts

      - name: Selftest – Live-Züge (Service + Kernlogik)
        run: npx tsx src/data/live-trips.selftest.ts

      - name: Selftest – Verlauf-Resolver
        run: npx tsx src/routing/verlauf-resolver.selftest.ts

      - name: Abhängigkeiten installieren (Web)
        run: npm --prefix web ci

      - name: Typecheck (Web)
        run: npm --prefix web run typecheck

      - name: Build (Web, statischer Export)
        run: npm --prefix web run build
