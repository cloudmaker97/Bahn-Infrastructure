name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies (server)
        run: npm ci

      - name: Typecheck (server)
        run: npm run typecheck

      # Selftests run without network/ISR data: the pure offline asserts apply,
      # the live-smoke blocks log/skip themselves cleanly (no hard asserts).
      - name: Selftest – geometry (segment stitching)
        run: npx tsx src/core/geometry.selftest.ts

      - name: Selftest – ttl-cache
        run: npx tsx src/core/ttl-cache.selftest.ts

      - name: Selftest – network status
        run: npx tsx src/data/network-status/network-status.selftest.ts

      - name: Selftest – SSE hub
        run: npx tsx src/server/sse-hub.selftest.ts

      - name: Selftest – TUI
        run: npx tsx src/tui/tui.selftest.ts

      - name: Selftest – live trips (service + core logic)
        run: npx tsx src/data/live-trips.selftest.ts

      - name: Selftest – alignment resolver
        run: npx tsx src/routing/alignment-resolver.selftest.ts

      - name: Install dependencies (web)
        run: npm --prefix web ci

      - name: Typecheck (web)
        run: npm --prefix web run typecheck

      - name: Build (web, static export)
        run: npm --prefix web run build
