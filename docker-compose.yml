# Docker Compose for Coolify (build pack "Docker Compose").
# Headless operation without the interactive TUI. Coolify manages the domain,
# reverse proxy (Traefik), and TLS itself – only the target port is announced
# via the magic env variable. No fixed host port mapping (Coolify does that).
services:
  isr:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      # Coolify derives the FQDN from this and proxies it to container port 8000.
      - SERVICE_FQDN_ISR_8000
      - PORT=8000
      - HEADLESS=1
    expose:
      - "8000"
    volumes:
      # Persistent ISR data -> no re-scraping on every deploy/restart.
      - isr-data:/app/data
    healthcheck:
      # Uses the fetch built into Node 22; no curl needed in the image.
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8000/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 5
      # The VERY FIRST start loads the ISR data from the DB WFS (several minutes),
      # only then does the HTTP server listen -> generous start period.
      start_period: 80s
    restart: unless-stopped

volumes:
  isr-data:
