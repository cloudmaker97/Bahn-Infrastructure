# Docker Compose für Coolify (Build-Pack "Docker Compose").
# Headless-Betrieb ohne interaktive TUI. Coolify verwaltet Domain, Reverse-Proxy
# (Traefik) und TLS selbst – hier wird nur der Ziel-Port über die Magic-Env-Variable
# bekannt gemacht. Kein festes Host-Port-Mapping (das macht Coolify).
services:
  isr:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      # Coolify erzeugt daraus die FQDN und proxyt sie auf Container-Port 8000.
      - SERVICE_FQDN_ISR_8000
      - PORT=8000
      - HEADLESS=1
    expose:
      - "8000"
    volumes:
      # Persistente ISR-Daten -> kein erneutes Scrapen bei jedem Deploy/Neustart.
      - isr-data:/app/data
    healthcheck:
      # Nutzt das in Node 22 eingebaute fetch; kein curl im Image nötig.
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8000/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 5
      # Der ALLERERSTE Start lädt die ISR-Daten vom DB-WFS (mehrere Minuten),
      # erst danach lauscht der HTTP-Server -> großzügige Startphase.
      start_period: 1200s
    restart: unless-stopped

volumes:
  isr-data:
