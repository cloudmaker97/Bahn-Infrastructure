<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ISR – Streckennetz</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🚆</text></svg>" />
  <!-- Leaflet lokal ausgeliefert (kein CDN/3rd-party); vendored unter public/vendor/leaflet/ -->
  <link rel="stylesheet" href="/vendor/leaflet/leaflet.css" />
  <style>
    /* Dark-Mode. Ruhige, augenschonende dunkle Palette. */
    :root {
      --panel:#161b22; --txt:#e6edf3; --muted:#9aa7b4; --accent:#4a9eff;
      --border:#2a323c; --field:#0f141a; --field-border:#39424d;
      --ok:#2ea968; --ok-bg:#12271c; --danger:#e5534b;
    }
    * { box-sizing:border-box; }
    html,body { margin:0; height:100%; overflow:hidden;
      font-family:system-ui,Segoe UI,Roboto,sans-serif; color:var(--txt); }
    /* Karte fuellt immer den kompletten Viewport – auch bei kleinen/mobilen Viewports.
       100dvh beruecksichtigt dynamische Browser-Leisten; 100vh als Fallback. */
    #map {
      position:fixed; inset:0;
      width:100vw; height:100vh; height:100dvh;
      background:#0b0f14;
    }
    /* Linke Seitenleiste: am Bildschirmrand angedockt (volle Höhe, bündig, nicht floatend). */
    .panel {
      position:fixed; z-index:1000; top:0; left:0; bottom:0; width:320px;
      max-width:calc(100vw - 52px);
      display:flex; flex-direction:column;
      background:var(--panel); color:var(--txt);
      border:none; border-right:1px solid var(--border);
      box-shadow:2px 0 16px rgba(0,0,0,.45);
      font-size:13px; overflow:hidden;
    }
    /* Eingeklappt: Höhe auf den Kopf schrumpfen (nicht die ganze Randhöhe belegen). */
    .panel.collapsed { bottom:auto; }
    /* Kopfzeile mit Ein-/Ausklapp-Schalter (v. a. auf Mobilgeraeten hilfreich) */
    .panel-head {
      display:flex; align-items:center; gap:8px; cursor:pointer;
      padding:12px 14px; border-bottom:1px solid var(--border); user-select:none;
    }
    .panel-title { flex:1; min-width:0; }
    .panel-head h1 { font-size:15px; margin:0; font-weight:650; }
    .panel-head .sub { color:var(--muted); font-size:11px; font-weight:400; display:block; margin-top:2px; }
    .panel-toggle {
      flex:none; width:26px; height:26px; border:1px solid var(--border);
      border-radius:6px; background:var(--field); color:var(--muted);
      font-size:13px; line-height:1; cursor:pointer; transition:transform .15s;
    }
    .panel-body { flex:1; overflow-y:auto; padding:4px 14px 14px; }
    .panel.collapsed .panel-body { display:none; }
    .panel.collapsed .panel-toggle { transform:rotate(-90deg); }
    .panel.collapsed .panel-head { border-bottom:none; }

    /* ---- Dark-Mode für Karte + Leaflet-Bedienelemente ---- */
    /* OSM-Tiles per CSS-Filter abdunkeln (Quelle bleibt OSM, kein neuer Anbieter).
       Nur die Kachel-Ebene; Marker/Overlays liegen in anderen Panes und bleiben farbig. */
    .leaflet-tile-pane { filter: invert(1) hue-rotate(180deg) brightness(0.92) contrast(0.95) saturate(0.85); }
    .leaflet-container { background:#0b0f14; }
    .leaflet-bar a, .leaflet-bar a:hover {
      background:var(--panel); color:var(--txt); border-bottom-color:var(--border);
    }
    .leaflet-control-attribution {
      background:rgba(22,27,34,.85)!important; color:var(--muted)!important;
    }
    .leaflet-control-attribution a { color:var(--accent)!important; }
    .leaflet-control-layers-toggle { filter:invert(0.9); }
    .leaflet-popup-content-wrapper, .leaflet-popup-tip {
      background:var(--panel); color:var(--txt); box-shadow:0 3px 16px rgba(0,0,0,.55);
    }
    .leaflet-tooltip { background:var(--panel); color:var(--txt); border-color:var(--border); }
    .leaflet-tooltip-top:before    { border-top-color:var(--panel); }
    .leaflet-tooltip-bottom:before { border-bottom-color:var(--panel); }
    .leaflet-tooltip-left:before   { border-left-color:var(--panel); }
    .leaflet-tooltip-right:before  { border-right-color:var(--panel); }

    /* Ebenen-Steuerung (rechts oben) dunkel und auf kleinen Viewports begrenzen */
    .leaflet-control-layers {
      max-height:calc(100dvh - 24px); overflow-y:auto; border-radius:10px;
      background:var(--panel); color:var(--txt); border:1px solid var(--border);
    }
    .leaflet-control-layers-expanded { padding:8px 10px; }

    .panel label { display:block; font-size:11px; color:var(--muted); margin:14px 0 4px;
      text-transform:uppercase; letter-spacing:.04em; font-weight:600; }
    .panel select, .panel input {
      width:100%; padding:8px 9px; border-radius:7px;
      border:1px solid var(--field-border); background:var(--field); color:var(--txt); font-size:13px;
    }
    .panel select:focus, .panel input:focus { outline:none; border-color:var(--accent); background:var(--panel); }
    .btn { border:1px solid transparent; border-radius:7px; cursor:pointer; font-size:13px;
      padding:8px 10px; font-weight:600; }
    .btn-primary { background:var(--accent); color:#fff; }
    .btn-ok { background:var(--ok); color:#fff; }
    .btn-ghost { background:var(--field); color:var(--muted); border-color:var(--field-border); font-weight:500; }
    .btn:hover { filter:brightness(1.05); }
    .row { display:flex; gap:8px; }
    .row > * { flex:1; }
    .note { font-size:11px; color:var(--muted); margin-top:10px; line-height:1.4; }
    #legend { margin-top:14px; border-top:1px solid var(--border); padding-top:12px; }
    #legend .item { display:flex; align-items:center; gap:8px; margin:5px 0; font-size:12px; }
    #legend .swatch { width:22px; height:4px; border-radius:2px; flex:none; }
    #status { margin-top:12px; font-size:11px; color:var(--muted); }
    /* Fortschrittsbalken beim Laden der Kartendaten */
    .bar { height:6px; background:var(--field); border:1px solid var(--field-border);
      border-radius:4px; overflow:hidden; margin-bottom:5px; }
    .bar-fill { height:100%; width:0; background:var(--accent); border-radius:4px; transition:width .12s linear; }
    .bar.indet .bar-fill { width:40%; animation:barIndet 1.1s infinite ease-in-out; }
    @keyframes barIndet { 0%{margin-left:-40%} 100%{margin-left:100%} }
    .leaflet-popup-content { font-size:12px; max-height:340px; overflow:auto; }
    .leaflet-popup-content h3 { margin:0 0 6px; font-size:14px; color:var(--txt); }
    .leaflet-popup-content table { border-collapse:collapse; width:100%; }
    .leaflet-popup-content td { padding:3px 6px; vertical-align:top; border-bottom:1px solid var(--border); }
    .leaflet-popup-content td.k { color:var(--muted); white-space:nowrap; font-weight:600; }
    .hint { font-size:11px; color:var(--muted); margin-top:10px; line-height:1.4; }
    a { color:var(--accent); }
    code { background:var(--field); padding:1px 4px; border-radius:4px; font-size:11px; }
    #routing { margin-top:14px; border-top:1px solid var(--border); padding-top:12px; }
    #rResult { margin-top:10px; font-size:12px; }
    #rResult .summary { background:var(--ok-bg); border:1px solid #1f5a3d; border-radius:8px; padding:10px; margin-bottom:8px; }
    #rResult .summary b { color:var(--ok); font-size:15px; }
    #rResult .wp { max-height:150px; overflow:auto; border:1px solid var(--border); border-radius:8px; }
    #rResult .wp div { padding:3px 8px; border-bottom:1px solid var(--border); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    #rResult .wp div:last-child { border-bottom:none; }
    #rResult .wp .rl { color:var(--accent); font-weight:600; }
    #rResult .err { color:var(--danger); }

    /* Responsive: auf schmalen Viewports schmaler andocken; eingeklappt startbar */
    @media (max-width:640px) {
      .panel { width:min(320px, 86vw); }
    }
  </style>
</head>
<body>
  <div id="map"></div>
  <div class="panel" id="panel">
    <div class="panel-head" id="panelHead">
      <button class="panel-toggle" id="panelToggle" title="Ein-/ausklappen" aria-label="Ein-/ausklappen">▾</button>
      <div class="panel-title">
        <h1>ISR – Streckennetz</h1>
        <span class="sub">Infrastrukturregister DB</span>
      </div>
    </div>
    <div class="panel-body" id="panelBody">

      <label>Einfärbung</label>
      <select id="colorMode">
        <option value="elektr">Elektrifizierung</option>
        <option value="speed">Höchstgeschwindigkeit</option>
        <option value="gleis">Gleisanzahl</option>
        <option value="uniform">Einfarbig</option>
      </select>

      <label>Streckennummer suchen</label>
      <div class="row">
        <input id="search" type="text" inputmode="numeric" placeholder="z. B. 1011" />
        <button id="searchBtn" class="btn btn-primary" style="flex:0 0 64px">Zoom</button>
      </div>

      <div id="routing">
        <label>Routenfindung (RL100)</label>
        <input id="rFrom" list="rlList" placeholder="Start – z. B. AH (Hamburg Hbf)" autocomplete="off" />
        <input id="rTo" list="rlList" placeholder="Ziel – z. B. MH (München Hbf)" autocomplete="off" style="margin-top:6px" />
        <datalist id="rlList"></datalist>
        <div class="row" style="margin-top:6px">
          <select id="rMode">
            <option value="fast">schnellste (Zeit)</option>
            <option value="short">kürzeste (Distanz)</option>
          </select>
          <button id="rGo" class="btn btn-ok" style="flex:0 0 84px">Route</button>
        </div>
        <button id="rClear" class="btn btn-ghost" style="width:100%;margin-top:6px;font-size:11px">Route löschen</button>
        <div id="rResult"></div>
      </div>

      <div id="legend"></div>
      <div id="status">Lade Daten …</div>
    </div>
  </div>

  <script src="/vendor/leaflet/leaflet.js"></script>
  <script>
  const map = L.map('map', { preferCanvas: true }).setView([51.2, 10.4], 6);
  L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19, attribution: '&copy; OpenStreetMap-Mitwirkende · Daten: DB InfraGO / ISR'
  }).addTo(map);

  const renderer = L.canvas({ padding: 0.5 });

  // ---- Farblogik ----
  const ELEKTR = {
    'Oberleitung': '#2f7fe0',
    'Stromschiene': '#9b59d0',
    'nicht elektrifiziert': '#e8863b',
  };
  const GLEIS = {
    'eingleisig': '#e8863b',
    'Richtungsgleis': '#2f7fe0',
    'Gegengleis': '#38b48b',
  };
  function speedColor(v) {
    const s = parseInt(v, 10);
    if (isNaN(s)) return '#8894a0';
    if (s >= 230) return '#c0245e';
    if (s >= 160) return '#e34a6f';
    if (s >= 120) return '#f0883e';
    if (s >= 100) return '#e8c135';
    if (s >= 80)  return '#7bbf4a';
    return '#3d9970';
  }
  const GREY = '#8894a0';

  function colorFor(p, mode) {
    if (mode === 'uniform') return '#2f7fe0';
    if (mode === 'speed')  return speedColor(p.BET_GESCHWINDIGKEIT);
    if (mode === 'gleis')  return GLEIS[p.INF_GLEISANZAHL] || GREY;
    return ELEKTR[p.INF_TRAKTIONSART] || GREY; // elektr
  }

  const LEGENDS = {
    elektr:  [['#2f7fe0','Oberleitung'],['#9b59d0','Stromschiene'],['#e8863b','nicht elektrifiziert'],[GREY,'keine Angabe']],
    gleis:   [['#2f7fe0','Richtungsgleis'],['#38b48b','Gegengleis'],['#e8863b','eingleisig'],[GREY,'keine Angabe']],
    uniform: [['#2f7fe0','Strecke']],
    speed:   [['#c0245e','≥ 230 km/h'],['#e34a6f','160–229'],['#f0883e','120–159'],['#e8c135','100–119'],['#7bbf4a','80–99'],['#3d9970','< 80'],[GREY,'k. A.']],
  };
  function renderLegend(mode) {
    document.getElementById('legend').innerHTML =
      LEGENDS[mode].map(([c,l]) => `<div class="item"><span class="swatch" style="background:${c}"></span>${l}</div>`).join('');
  }

  // ---- Popup ----
  const LABELS = {
    ISR_STRE_NR:'Streckennr.', STRECKEN_ABSCHNITT:'Abschnitt', ISR_STRECKE_VON_BIS:'von – bis',
    ISR_KM_VON:'km von', ISR_KM_BIS:'km bis', ALG_LAENGE_ABSCHNITT:'Länge (km)',
    ALG_INFRA_BETR:'Betreiber', ALG_STAAT:'Staat', ALG_STRECKENKLASSE:'Streckenklasse',
    ALG_VERKEHRSART:'Verkehrsart', ALG_TEN_KLASSIFIZIERUNG_PV:'TEN Personenv.',
    ALG_TEN_KLASSIFIZIERUNG_GV:'TEN Güterv.', ALG_MIN_LIRA_PROFIL:'LiRa-Profil (min)',
    ALG_KV_PROFIL:'KV-Profil', INF_GLEISANZAHL:'Gleisanzahl', INF_TRAKTIONSART:'Traktionsart',
    INF_KOMM_SYSTEM:'Kommunikation', BET_GESCHWINDIGKEIT:'V max (km/h)',
    BET_GESCHWINDIGKEIT_CLUSTER:'V-Cluster', LST_PZB:'PZB', LST_LZB:'LZB',
    LST_ETCS_LEVEL_VERS:'ETCS', ENE_TRAKT_STROMART:'Stromart',
  };
  const ORDER = Object.keys(LABELS);
  function popupHtml(p) {
    let rows = ORDER.filter(k => p[k] != null && p[k] !== '')
      .map(k => `<tr><td class="k">${LABELS[k]}</td><td>${String(p[k])}</td></tr>`).join('');
    return `<h3>Strecke ${p.ISR_STRE_NR ?? '?'}</h3><table>${rows}</table>`;
  }

  let lineLayer, mode = 'elektr';
  const idIndex = {};   // ISR_STRE_NR -> array of layers
  const stelIndex = {}; // STEL_ID -> array of {nr, vonBis, kmVon, kmBis} (zugehörige Abschnitte)

  function styleFn(f){ return { color: colorFor(f.properties, mode), weight: 2.2, opacity: 0.9 }; }

  function buildLines(gj) {
    lineLayer = L.geoJSON(gj, {
      renderer, style: styleFn,
      onEachFeature: (f, layer) => {
        layer.bindPopup(() => popupHtml(f.properties), { maxWidth: 380 });
        const p = f.properties;
        (idIndex[p.ISR_STRE_NR] = idIndex[p.ISR_STRE_NR] || []).push(layer);
        // Abschnitt beiden Endpunkt-Betriebsstellen zuordnen (STEL_ID von/bis).
        const seg = { nr: p.ISR_STRE_NR, vonBis: p.ISR_STRECKE_VON_BIS || '', kmVon: p.ISR_KM_VON || '', kmBis: p.ISR_KM_BIS || '' };
        for (const stel of [p.ISR_STEL_ID_VON, p.ISR_STEL_ID_BIS]) {
          if (stel == null) continue;
          (stelIndex[stel] = stelIndex[stel] || []).push(seg);
        }
      }
    }).addTo(map);
  }

  // ---- Overlay-Hilfen ----
  function tablePopup(title, rows) {
    return `<h3>${title}</h3><table>` +
      rows.filter(([,v]) => v != null && v !== '').map(([k,v]) =>
        `<tr><td class="k">${k}</td><td>${v}</td></tr>`).join('') + '</table>';
  }
  // Betriebsstellen-Popup: Basisdaten + Liste der zugehörigen Strecken/Abschnitte (Lookup via STEL_ID).
  function bstPopup(p) {
    const base = tablePopup('Betriebsstelle', [
      ['Name', p.BST_STELLE_NAME], ['RL100', p.BST_RL100],
      ['km', p.LAGE_KM_V], ['TAF/TAP', p.BST_TAF_TAP_PC], ['Art', p.BST_STELLENART],
    ]);
    const list = stelIndex[p.STEL_ID] || [];
    if (!list.length) return base;
    const rows = list.map(a =>
      `<tr><td class="k">${siEsc(a.nr)}</td><td>${siEsc(a.vonBis)}</td><td>${siEsc(a.kmVon)} → ${siEsc(a.kmBis)}</td></tr>`).join('');
    return base +
      `<div style="margin-top:8px;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;font-weight:600">Zugehörige Strecken/Abschnitte (${list.length})</div>` +
      `<div style="max-height:180px;overflow:auto"><table>${rows}</table></div>`;
  }
  function pointLayer(gj, opts) {
    return L.geoJSON(gj, {
      renderer,
      pointToLayer: (f, ll) => L.circleMarker(ll, { radius: opts.radius, color:'#111',
        weight:1, fillColor: opts.fill, fillOpacity: 0.9 }),
      onEachFeature: (f, layer) => layer.bindPopup(() => opts.popup(f.properties), { maxWidth: 360 }),
    });
  }
  function lineOverlay(gj, opts) {
    return L.geoJSON(gj, { renderer, style: { color: opts.color, weight: 4, opacity: 0.9 },
      onEachFeature: (f, layer) => layer.bindPopup(() => opts.popup(f.properties), { maxWidth: 360 }) });
  }
  const D = '/data/';

  // ---- Laden ----
  const status = document.getElementById('status');

  // Laedt eine (grosse) Datei und meldet den Fortschritt via Streaming.
  // onProgress(frac): frac 0..1 wenn Content-Length bekannt, sonst null (unbestimmt).
  async function fetchJsonWithProgress(url, onProgress) {
    const resp = await fetch(url);
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const total = +resp.headers.get('Content-Length') || 0;
    if (!resp.body || !total) { onProgress(null); return resp.json(); }
    const reader = resp.body.getReader();
    const chunks = []; let received = 0;
    for (;;) {
      const { done, value } = await reader.read();
      if (done) break;
      chunks.push(value); received += value.length;
      onProgress(received / total);
    }
    const merged = new Uint8Array(received); let pos = 0;
    for (const c of chunks) { merged.set(c, pos); pos += c.length; }
    return JSON.parse(new TextDecoder().decode(merged));
  }

  status.innerHTML = '<div class="bar indet" id="loadBar"><div class="bar-fill" id="loadFill"></div></div><span id="loadTxt">Lade Kartendaten …</span>';
  const bar = document.getElementById('loadBar'), fill = document.getElementById('loadFill'), txt = document.getElementById('loadTxt');
  fetchJsonWithProgress(D + 'map_streckenabschnitte.geojson', frac => {
    if (frac == null) return;                       // unbestimmt -> animierter Balken bleibt
    bar.classList.remove('indet');
    fill.style.width = (frac * 100).toFixed(1) + '%';
    txt.textContent = `Lade Kartendaten … ${Math.round(frac * 100)} %`;
  }).then(lines => {
    buildLines(lines);
    if (siLastData) siFillRuhen(siLastData.streckenruhen);   // Ruhen-Linien nachziehen, sobald die Strecken-Geometrie geladen ist
    status.textContent = `${lines.features.length.toLocaleString('de-DE')} Abschnitte geladen`;
  }).catch(err => { status.innerHTML = '<span class="err">Fehler beim Laden: ' + err + '</span>'; });

  // Overlays parallel laden und in die Layer-Steuerung eintragen
  // Auf schmalen Viewports das Ebenen-Feld als kompaktes Icon (antippbar), sonst offen
  const narrowVP = window.matchMedia('(max-width:640px)').matches;
  const overlayControl = L.control.layers(null, {}, { collapsed: narrowVP, position: 'topright' }).addTo(map);
  // Für das Live-Züge-Modul (separates ES-Modul) die geteilten Objekte bereitstellen.
  window.__ISR_MAP__ = { map, renderer, overlayControl };
  const overlays = [
    { file:'map_streckenuebergaenge.geojson', label:'Übergangsstellen', on:false, make:(gj)=>pointLayer(gj,{radius:3.5,fill:'#ffd23f',
        popup:p=>tablePopup('Übergangsstelle',[['Name',p.BST_STELLE_NAME],['Strecke 1',p.STRECKE1],['Strecke 2',p.STRECKE2],['RL100',p.REF_RL100],['Stellenart',p.BST_STELLENART]])}) },
    { file:'map_betriebsstellen.geojson', label:'Betriebsstellen', on:false, make:(gj)=>pointLayer(gj,{radius:3,fill:'#4aa3ff',
        popup:bstPopup}) },
    { file:'map_tunnel.geojson', label:'Tunnel', on:false, make:(gj)=>lineOverlay(gj,{color:'#b06be8',
        popup:p=>tablePopup('Tunnel: '+(p.ALG_TUNNELNAME??''),[['Strecke',p.DET_STR_NR],['Länge (m)',p.ALG_TUNNELLAENGE],['Art',p.ALG_TUNNELART],['TSI-konf.',p.ALG_TSI_KONF],['Notausgang',p.ALG_TUNN_NOTAUS_KZ]])}) },
    { file:'map_bruecken.geojson', label:'Brücken', on:false, make:(gj)=>lineOverlay(gj,{color:'#2ec76b',
        popup:p=>tablePopup('Brücke: '+(p.ALG_BRUECKENNAME??''),[['Strecke',p.DET_STR_NR],['Länge (m)',p.ALG_BRUECKENLAENGE],['km von',p.KMVON_V],['km bis',p.KMBIS_V]])}) },
    { file:'map_bahnuebergaenge.geojson', label:'Bahnübergänge', on:false, make:(gj)=>pointLayer(gj,{radius:2.5,fill:'#ff7043',
        popup:p=>tablePopup('Bahnübergang: '+(p.ALG_BAHNUEBERGANGNAME??''),[['Strecke',p.ALG_DBNETZ_STRECKE],['Sicherungsart',p.ALG_SICHERUNGSART],['Kreuzungspartner',p.ALG_KREUZUNGSPARTNER]])}) },
  ];
  overlays.forEach(o => {
    fetch(D + o.file).then(r => r.json()).then(gj => {
      const layer = o.make(gj);
      overlayControl.addOverlay(layer, `${o.label} (${gj.features.length.toLocaleString('de-DE')})`);
      if (o.on) layer.addTo(map);
    }).catch(()=>{});
  });

  // ---- Streckeninfo (strecken-info.de via /api/streckeninfo) ----
  // Drei umschaltbare Karten-Overlays (Störungen, Baustellen, Streckenruhen) plus
  // eine geolose Sammelmeldungen-Liste im linken Panel. Auto-Refresh alle 3 Minuten.
  //
  // Robuster Refresh-Ansatz: Pro Kategorie eine feste L.layerGroup(), die bei jedem
  // Load geleert und neu befüllt wird. Die Group bleibt in der Ebenen-Steuerung
  // registriert -> der An/Aus-Zustand bleibt erhalten, es entstehen keine Dubletten.
  // Standard-Filter: nur Live-Züge + Störungen sichtbar. Baustellen/Streckenruhen
  // sind registriert, aber standardmäßig ausgeschaltet (per Ebenen-Steuerung zuschaltbar).
  const siStoerungen = L.layerGroup().addTo(map);   // standardmäßig sichtbar
  const siBaustellen = L.layerGroup();
  const siRuhen      = L.layerGroup();
  let siOverlaysAdded = false;                       // Ebenen-Einträge nur einmal anlegen
  let siLastData = null;                             // letzte Streckeninfo-Antwort (fuer Nachziehen der Ruhen-Linien)

  // Farben (klar unterscheidbar, abgesetzt von den Infrastruktur-Overlays)
  const SI_COLOR = { stoerung:'#d23f3f', baustelle:'#f0883e', ruhe:'#8e44ad' };

  // Dezente Statuszeile – eigenes Element, damit der Streckenabschnitt-Status
  // (#status wird beim Laden per textContent überschrieben) NICHT verloren geht.
  const siStatus = document.createElement('div');
  siStatus.id = 'siStatus';
  siStatus.style.cssText = 'font-size:11px;color:var(--muted);margin-top:6px;';
  status.parentNode.insertBefore(siStatus, status.nextSibling);

  // Sammelmeldungen-Box unten im linken Panel (ein-/ausklappbar)
  const siSammelBox = document.createElement('div');
  siSammelBox.id = 'sammelmeldungen';
  siSammelBox.style.cssText = 'margin-top:14px;border-top:1px solid var(--border);padding-top:12px;display:none;';
  document.getElementById('panelBody').appendChild(siSammelBox);

  // ---- kleine Helfer ----
  function siEsc(s) {
    return String(s).replace(/[&<>"]/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;' }[c]));
  }
  function siFmtDate(s) {                    // ISO-ähnlich -> lesbar, robust gegen Müll
    if (!s) return '';
    const d = new Date(s);
    return isNaN(d.getTime()) ? String(s) : d.toLocaleString('de-DE');
  }
  function siZeitraum(beginn, ende) {
    const a = siFmtDate(beginn), b = siFmtDate(ende);
    if (a && b) return a + ' – ' + b;
    return a || b || '';
  }
  function siGueltigkeitKurz(g) {           // Kurzform der ersten Gültigkeit (Felder defensiv)
    if (!Array.isArray(g) || !g.length) return '';
    const x = g[0] || {};
    const tage = Array.isArray(x.wochentage) ? x.wochentage.join(', ')
               : (Array.isArray(x.tage) ? x.tage.join(', ') : (x.wochentage || x.tage || ''));
    const von = x.von || x.uhrzeitVon || x.zeitVon || x.beginn || '';
    const bis = x.bis || x.uhrzeitBis || x.zeitBis || x.ende || '';
    const zeit = (von || bis) ? (String(von) + '–' + String(bis)) : '';
    const s = [tage, zeit].filter(Boolean).join(' ');
    return s ? (s + (g.length > 1 ? ' (+' + (g.length - 1) + ')' : '')) : '';
  }

  // ---- Popups je Kategorie ----
  function siStoerungPopup(p) {
    const wirkung = Array.isArray(p.wirkungen)
      ? p.wirkungen.map(w => {
          const va = Array.isArray(w.verkehrsarten) && w.verkehrsarten.length ? ' (' + w.verkehrsarten.join('/') + ')' : '';
          return (w.wirkung || '') + va;
        }).filter(Boolean).join('; ')
      : '';
    const titel = p.cause ? (p.cause + (p.subcause ? ' – ' + p.subcause : '')) : 'Störung';
    return tablePopup(titel, [
      ['Text', p.text],
      ['Wirkung', wirkung],
      ['Gleiseinschränkung', p.gleisEinschraenkung],
      ['Zeitraum', siZeitraum(p.beginn, p.ende)],
    ]);
  }
  function siBaustellePopup(p) {
    const von = [p.langnameVon, p.ril100Von ? '(' + p.ril100Von + ')' : ''].filter(Boolean).join(' ');
    const bis = [p.langnameBis, p.ril100Bis ? '(' + p.ril100Bis + ')' : ''].filter(Boolean).join(' ');
    const vonBis = (von || bis) ? (von + ' → ' + bis) : '';
    const strecken = Array.isArray(p.streckennummern) ? p.streckennummern.join(', ') : '';
    return tablePopup(p.arbeiten || 'Baustelle', [
      ['von → bis', vonBis],
      ['Strecke(n)', strecken],
      ['Richtung', p.richtung],
      ['Wirkung', p.wirkung],
      ['Gleiseinschränkung', p.gleisEinschraenkung],
      ['Zeitraum', siZeitraum(p.beginn, p.ende)],
      ['Gültigkeit', siGueltigkeitKurz(p.gueltigkeiten)],
    ]);
  }
  function siRuhePopup(p) {
    const titel = [p.bstLangname, p.ril100 ? '(' + p.ril100 + ')' : ''].filter(Boolean).join(' ') || 'Streckenruhe';
    return tablePopup(titel, [
      ['Arbeiten', p.arbeiten],
      ['Strecke', p.streckennummer],
      ['Region', p.region],
      ['Zeitraum', siZeitraum(p.beginn, p.ende)],
      ['Gültigkeit', siGueltigkeitKurz(p.gueltigkeiten)],
    ]);
  }

  // FeatureCollection (Point + LineString gemischt) -> Leaflet-Layer.
  // L.geoJSON dreht [lon,lat] selbst auf [lat,lon]. SCHWER etwas kräftiger als LEICHT.
  function siBuildLayer(fc, cfg) {
    return L.geoJSON(fc, {
      renderer,
      pointToLayer: (f, ll) => {
        const schwer = f.properties && f.properties.gleisEinschraenkung === 'SCHWER';
        return L.circleMarker(ll, { radius: schwer ? 8 : 6, color:'#ffffff', weight:1.5,
          fillColor: cfg.color, fillOpacity: 0.9 });
      },
      style: (f) => {
        const schwer = f.properties && f.properties.gleisEinschraenkung === 'SCHWER';
        return { color: cfg.color, weight: schwer ? 6 : 4, opacity: 0.9 };
      },
      onEachFeature: (f, layer) => layer.bindPopup(() => cfg.popup(f.properties || {}), { maxWidth: 360 }),
    });
  }
  function siFill(group, fc, cfg) {          // Gruppe leeren und neu befüllen
    group.clearLayers();
    if (fc && Array.isArray(fc.features) && fc.features.length) siBuildLayer(fc, cfg).addTo(group);
  }

  // Streckenruhen als LINIE entlang der ganzen Strecke darstellen: die API liefert je
  // Ruhe nur einen Punkt + streckennummer (keine Ausdehnung), daher wird die Geometrie
  // der Strecke aus dem bereits geladenen Abschnitts-Index (idIndex) gezogen und in der
  // Ruhe-Farbe gestrichelt nachgezeichnet. Zusätzlich ein Ankerpunkt an der gemeldeten
  // Betriebsstelle (und Fallback, falls die Strecke (noch) nicht im Index ist). Popup je Klick.
  function siFillRuhen(fc) {
    siRuhen.clearLayers();
    const feats = (fc && Array.isArray(fc.features)) ? fc.features : [];
    for (const f of feats) {
      const p = f.properties || {};
      const nr = p.streckennummer;
      const strecke = (nr != null) ? (idIndex[nr] || idIndex[parseInt(nr, 10)]) : null;
      let gezeichnet = false;
      if (strecke && strecke.length) {
        for (const seg of strecke) {
          L.polyline(seg.getLatLngs(), { renderer, color: SI_COLOR.ruhe, weight: 5, opacity: 0.85, dashArray: '6 7' })
            .bindPopup(() => siRuhePopup(p), { maxWidth: 360 })
            .addTo(siRuhen);
          gezeichnet = true;
        }
      }
      const g = f.geometry;                    // Ankerpunkt/Fallback an der gemeldeten Betriebsstelle
      if (g && g.type === 'Point' && Array.isArray(g.coordinates)) {
        const [lon, lat] = g.coordinates;
        L.circleMarker([lat, lon], { renderer, radius: gezeichnet ? 5 : 6, color: '#ffffff', weight: 1.5,
            fillColor: SI_COLOR.ruhe, fillOpacity: 0.95 })
          .bindPopup(() => siRuhePopup(p), { maxWidth: 360 })
          .addTo(siRuhen);
      }
    }
  }

  // Sammelmeldungen (kein Geo) im Panel rendern; bei 0 Einträgen ausblenden.
  function siRenderSammel(list) {
    const arr = Array.isArray(list) ? list : [];
    if (!arr.length) { siSammelBox.style.display = 'none'; siSammelBox.innerHTML = ''; return; }
    siSammelBox.style.display = '';
    const items = arr.map(s => {
      const text = (s.text || '').trim();
      const kurz = text.length > 160 ? text.slice(0, 160) + ' …' : text;
      const zeit = siZeitraum(s.beginn, s.ende);
      return `<div style="padding:6px 0;border-bottom:1px solid var(--border)">
        <div style="font-weight:600">${siEsc(s.cause || 'Sammelmeldung')}</div>
        ${kurz ? `<div style="color:var(--muted);margin-top:2px;line-height:1.35">${siEsc(kurz)}</div>` : ''}
        ${zeit ? `<div style="color:var(--muted);font-size:11px;margin-top:2px">${siEsc(zeit)}</div>` : ''}
      </div>`;
    }).join('');
    siSammelBox.innerHTML =
      `<details open>
         <summary style="cursor:pointer;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;font-weight:600">Sammelmeldungen (${arr.length})</summary>
         <div style="max-height:220px;overflow:auto;margin-top:8px">${items}</div>
       </details>`;
  }

  // Ebenen-Einträge nur einmal anlegen (Zähler statisch aus dem ersten Load).
  function siAddOverlaysOnce(counts) {
    if (siOverlaysAdded) return;
    overlayControl.addOverlay(siStoerungen, 'Störungen ('    + (counts.stoerungen    || 0) + ')');
    overlayControl.addOverlay(siBaustellen, 'Baustellen ('   + (counts.baustellen    || 0) + ')');
    overlayControl.addOverlay(siRuhen,      'Streckenruhen (' + (counts.streckenruhen || 0) + ')');
    siOverlaysAdded = true;
  }

  function loadStreckenInfo() {
    fetch('/api/streckeninfo').then(r => {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.json();
    }).then(data => {
      data = data || {};
      siLastData = data;
      siFill(siStoerungen, data.stoerungen,    { color: SI_COLOR.stoerung,  popup: siStoerungPopup });
      siFill(siBaustellen, data.baustellen,    { color: SI_COLOR.baustelle, popup: siBaustellePopup });
      siFillRuhen(data.streckenruhen);
      const counts = data.counts || {
        stoerungen:    ((data.stoerungen    && data.stoerungen.features)    || []).length,
        baustellen:    ((data.baustellen    && data.baustellen.features)    || []).length,
        streckenruhen: ((data.streckenruhen && data.streckenruhen.features) || []).length,
      };
      siAddOverlaysOnce(counts);
      siRenderSammel(data.sammelmeldungen);
      if (data.error) {
        siStatus.textContent = 'Streckeninfo: ' + data.error;
      } else {
        siStatus.textContent = 'Streckeninfo: ' + (counts.stoerungen || 0) + ' Störungen · '
          + (counts.baustellen || 0) + ' Baustellen · ' + (counts.streckenruhen || 0) + ' Streckenruhen';
      }
    }).catch(err => {
      // Overlays trotzdem (leer) registrieren, damit sie umschaltbar bleiben.
      siAddOverlaysOnce({});
      siStatus.textContent = 'Streckeninfo nicht verfügbar (' + err.message + ')';
    });
  }
  loadStreckenInfo();
  setInterval(loadStreckenInfo, 180000);   // alle 3 Minuten aktualisieren

  // Live-Push: nach einem TUI-/TTL-Refresh sofort neu laden (Poll bleibt Sicherheitsnetz).
  try {
    const siEvents = new EventSource('/api/streckeninfo/events');
    siEvents.addEventListener('streckeninfo', () => loadStreckenInfo());
  } catch (e) { /* EventSource nicht verfügbar -> Poll genügt */ }

  // ---- Bedienung ----
  document.getElementById('colorMode').addEventListener('change', e => {
    mode = e.target.value;
    if (lineLayer) lineLayer.setStyle(styleFn);
    renderLegend(mode);
  });
  function doSearch() {
    const nr = document.getElementById('search').value.trim();
    const layers = idIndex[nr] || idIndex[parseInt(nr,10)];
    if (!layers || !layers.length) { status.textContent = `Strecke ${nr} nicht gefunden`; return; }
    const grp = L.featureGroup(layers);
    map.fitBounds(grp.getBounds().pad(0.2));
    layers.forEach(l => l.setStyle({ color:'#ff2d55', weight:4 }));
    status.textContent = `Strecke ${nr}: ${layers.length} Abschnitt(e)`;
  }
  document.getElementById('searchBtn').addEventListener('click', doSearch);
  document.getElementById('search').addEventListener('keydown', e => { if (e.key==='Enter') doSearch(); });

  // ---- Routing ----
  let routeLayer = null;
  const rList = document.getElementById('rlList');
  const rResult = document.getElementById('rResult');

  // Autocomplete: bei Eingabe Vorschläge vom Server holen
  let acTimer;
  function autocomplete(ev) {
    clearTimeout(acTimer);
    const q = ev.target.value.trim();
    if (q.length < 1) return;
    acTimer = setTimeout(async () => {
      try {
        const r = await fetch('/api/stations?q=' + encodeURIComponent(q));
        const opts = await r.json();
        rList.innerHTML = opts.map(o =>
          `<option value="${o.rl100}">${o.rl100} – ${o.name}</option>`).join('');
      } catch (_) {}
    }, 150);
  }
  document.getElementById('rFrom').addEventListener('input', autocomplete);
  document.getElementById('rTo').addEventListener('input', autocomplete);

  function clearRoute() {
    if (routeLayer) { map.removeLayer(routeLayer); routeLayer = null; }
    rResult.innerHTML = '';
  }
  document.getElementById('rClear').addEventListener('click', clearRoute);

  async function calcRoute() {
    const from = document.getElementById('rFrom').value.trim();
    const to = document.getElementById('rTo').value.trim();
    const mode = document.getElementById('rMode').value;
    if (!from || !to) { rResult.innerHTML = '<div class="err">Start und Ziel angeben.</div>'; return; }
    rResult.innerHTML = 'Berechne Route …';
    clearRoute();
    try {
      const r = await fetch(`/api/route?from=${encodeURIComponent(from)}&to=${encodeURIComponent(to)}&mode=${mode}`);
      const d = await r.json();
      if (!d.ok) { rResult.innerHTML = `<div class="err">${d.error}</div>`; return; }

      // Route zeichnen (FeatureGroup aus Linie + Start-/Zielmarker)
      const lines = d.segments.map(s => s.coords);
      const poly = L.polyline(lines, { color:'#ff2d55', weight:5, opacity:0.9 });
      routeLayer = L.featureGroup([poly]).addTo(map);
      // Start-/Zielmarker
      const mk = (wp, color, label) => wp.lat != null ? L.circleMarker([wp.lat, wp.lon],
        { radius:7, color:'#111', weight:2, fillColor:color, fillOpacity:1 })
        .bindTooltip(`${label}: ${wp.rl100||''} ${wp.name||''}`, {permanent:false}).addTo(routeLayer) : null;
      mk(d.from, '#38b48b', 'Start'); mk(d.to, '#ff2d55', 'Ziel');
      map.fitBounds(routeLayer.getBounds().pad(0.15));

      const h = Math.floor(d.totalTimeMin/60), m = Math.round(d.totalTimeMin%60);
      const zeit = h > 0 ? `${h} h ${m} min` : `${m} min`;
      const modeLabel = d.mode === 'short' ? 'kürzeste' : 'schnellste';
      const wpHtml = d.waypoints.map(w =>
        `<div><span class="rl">${w.rl100||'—'}</span> ${w.name||('STEL '+w.stel)}</div>`).join('');
      rResult.innerHTML =
        `<div class="summary">${modeLabel} Route<br>
          <b>${d.totalDistKm.toLocaleString('de-DE')} km</b> · <b>${zeit}</b><br>
          <span style="color:var(--muted);font-size:11px">${d.nWaypoints} Betriebsstellen · ${d.nEdges} Abschnitte · ⌀ ${(d.totalDistKm/(d.totalTimeMin/60)).toFixed(0)} km/h</span>
        </div>
        <div class="wp">${wpHtml}</div>`;
    } catch (e) {
      rResult.innerHTML = `<div class="err">Fehler: ${e}. Läuft der Server (node isr-server.js)?</div>`;
    }
  }
  document.getElementById('rGo').addEventListener('click', calcRoute);
  document.getElementById('rTo').addEventListener('keydown', e => { if (e.key==='Enter') calcRoute(); });

  renderLegend(mode);

  // ---- Panel ein-/ausklappen ----
  const panel = document.getElementById('panel');
  document.getElementById('panelHead').addEventListener('click', () => {
    panel.classList.toggle('collapsed');
    document.getElementById('panelToggle').textContent = panel.classList.contains('collapsed') ? '▸' : '▾';
  });
  // Auf schmalen Viewports (Handy) eingeklappt starten, damit die Karte frei bleibt
  if (window.matchMedia('(max-width:640px)').matches) {
    panel.classList.add('collapsed');
    document.getElementById('panelToggle').textContent = '▸';
  }
  </script>
  <script type="module">
    import { initLiveTrips } from './live-trips.js?v=3';
    const ctx = window.__ISR_MAP__;
    if (ctx) initLiveTrips({ map: ctx.map, L: window.L, renderer: ctx.renderer, overlayControl: ctx.overlayControl, defaultOn: true });
  </script>
</body>
</html>
